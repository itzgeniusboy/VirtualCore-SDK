name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x ./NewBlackbox/gradlew && chmod +x ./Loader/gradlew

    - name: Build NewBlackbox AAR
      run: |
        cd NewBlackbox
        ./gradlew Bcore:assembleRelease

    - name: Copy NewBlackbox AAR to Loader
      run: |
        mkdir -p Loader/app/libs
        cp NewBlackbox/Bcore/build/outputs/aar/Bcore-release.aar Loader/app/libs/Bcore-release.aar

    - name: Build Loader (Release)
      run: |
        cd Loader
        ./gradlew assembleRelease

    - name: Build Loader (Debug)
      run: |
        cd Loader
        ./gradlew assembleDebug

    - name: Upload NewBlackbox AAR as artifact
      uses: actions/upload-artifact@v3
      with:
        name: NewBlackbox-AAR
        path: NewBlackbox/Bcore/build/outputs/aar/Bcore-release.aar

    - name: Upload Loader Release APK as artifact
      uses: actions/upload-artifact@v3
      with:
        name: Loader-Release-APK
        path: Loader/app/build/outputs/apk/release/app-release.apk

    - name: Upload Loader Debug APK as artifact
      uses: actions/upload-artifact@v3
      with:
        name: Loader-Debug-APK
        path: Loader/app/build/outputs/apk/debug/app-debug.apk
        
